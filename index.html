<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP USER SYSTEM MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:url('begron.png') no-repeat center;
  background-size:cover;
}
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}
.menu{
  position:fixed;
  top:10px;
  left:10px;
  font-size:26px;
  cursor:pointer;
}
.menu-box{
  position:fixed;
  top:50px;
  left:10px;
  background:#020617;
  padding:12px;
  border-radius:12px;
  display:none;
  z-index:999;
  box-shadow:0 0 25px #ff00aa;
}
.menu-box.show{display:block}
.logo-top{
  width:110px;
  display:block;
  margin:10px auto;
  border-radius:20px;
  box-shadow:0 0 20px #ff00aa;
}
.title{
  text-align:center;
  font-size:24px;
  text-shadow:0 0 10px #ff00aa;
}
.container{padding:20px}
.card{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 40px #ff00aa;
}
.input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}
.role-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.role{
  padding:12px;
  background:#111;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
.role.active{background:#ff00aa}
.harga{color:yellow;margin-top:10px;font-weight:bold}
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff00aa;
  color:white;
}
.item{
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}
.pending{color:orange;}
.valid{color:lime;}
.tolak{color:red;}
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
  display:none;
  box-shadow:0 0 20px #ff00aa;
}
img{width:100%;margin-top:10px;border-radius:10px}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="menu-box" id="menuBox">
  👤 VIP USER
  <hr>
  <p onclick="logout()" style="color:red;">Logout</p>
</div>

<div class="toast" id="toast"></div>

<div class="container">

<img src="logo.png" class="logo-top">
<div class="title">💗 VIP USER PANEL</div>

<div class="card">
<h3>📊 Statistik</h3>
<div id="stat"></div>
</div>

<div class="card">
<h3>Buat Akun</h3>

<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">

<input type="file" id="file" class="input">
<img id="preview" style="display:none">

<div class="role-box">
<div class="role" onclick="selectRole(this,'OWNER',100000)">OWNER</div>
<div class="role" onclick="selectRole(this,'RESELLER',70000)">RESELLER</div>
<div class="role" onclick="selectRole(this,'VIP',60000)">VIP</div>
<div class="role" onclick="selectRole(this,'MEMBER',40000)">MEMBER</div>
</div>

<div id="harga" class="harga"></div>

<button class="btn" onclick="kirim()">📤 Kirim ke Admin</button>
<button class="btn" onclick="hapus()">🗑️ Hapus Semua</button>

</div>

<div class="card">
<h3>📜 Riwayat</h3>
<input id="search" class="input" placeholder="Cari username..." onkeyup="load()">
<div id="list"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0NJaW-W50zCvJEiU4Zp2I",
  authDomain: "vip-user-system-123.firebaseapp.com",
  databaseURL: "https://vip-user-system-123-default-rtdb.firebaseio.com",
  projectId: "vip-user-system-123"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.toggleMenu = ()=> menuBox.classList.toggle("show");

function toast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2000);
}

window.logout = ()=> location.reload();

let role="", harga=0, img="";
const hargaEl=document.getElementById("harga");

window.selectRole = function(el,r,h){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;
 harga=h;
 hargaEl.innerHTML="💰 Rp "+h.toLocaleString("id-ID");
}

file.onchange=e=>{
 let r=new FileReader();
 r.onload=()=>{
  img=r.result;
  preview.src=img;
  preview.style.display="block";
 };
 r.readAsDataURL(e.target.files[0]);
};

window.kirim = function(){
 if(!username.value||!password.value||!role||!img){
  toast("Lengkapi semua!");
  return;
 }

 push(ref(db,"permohonan"),{
  username:username.value,
  password:password.value,
  role:role,
  harga:harga,
  img:img,
  status:"Pending",
  waktu:new Date().toLocaleString()
 });

 toast("📤 Dikirim ke admin!");

 username.value="";
 password.value="";
 preview.style.display="none";
 hargaEl.innerHTML="";
}

window.hapus = function(){
 remove(ref(db,"permohonan"));
}

function load(){
 onValue(ref(db,"permohonan"),snap=>{
  let data=[];
  snap.forEach(c=>data.push(c.val()));

  let search=document.getElementById("search").value.toLowerCase();

  let pending=data.filter(d=>d.status==="Pending").length;
  let ok=data.filter(d=>d.status==="Approved").length;
  let no=data.filter(d=>d.status==="Rejected").length;
  let total=data.length;
  let uang=data.reduce((a,b)=>a+(b.harga||0),0);

  stat.innerHTML=`
  ⏳ Pending: ${pending}<br>
  ✔ Approved: ${ok}<br>
  ❌ Ditolak: ${no}<br>
  👤 Total: ${total}<br>
  💰 Rp ${uang.toLocaleString("id-ID")}
  `;

  list.innerHTML=data
  .filter(d=>d.username.toLowerCase().includes(search))
  .slice().reverse()
  .map(d=>{

  let status="";

  if(d.status==="Pending"){
   status=`<span class="pending">⏳ Menunggu admin...</span>`;
  }

  if(d.status==="Approved"){
   status=`
   <span class="valid">✔ VALID</span><br>
   ✔ Akun telah dibuat<br>
   👤 ${d.username}<br>
   🔒 ${d.password}<br>
   📅 ${d.waktu}
   `;
  }

  if(d.status==="Rejected"){
   status=`<span class="tolak">❌ Ditolak</span>`;
  }

  return `
  <div class="item">
  <b>${d.username}</b> (${d.role})<br>
  💰 Rp ${d.harga.toLocaleString("id-ID")}<br>
  ${status}
  <img src="${d.img}">
  </div>
  `;
  }).join("");
 });
}

load();
</script>

</body>
</html>
