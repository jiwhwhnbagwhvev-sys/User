<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP USER SYSTEM</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}
.container{padding:20px}
.card{
  background:#111827;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}
.input,.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}
.input{background:#1f2937;color:white}
.btn{background:#ff00aa;color:white}
.role{background:#1f2937;padding:10px;margin-top:5px;border-radius:10px;cursor:pointer}
.role.active{background:#ff00aa}
img{width:100%;border-radius:10px;margin-top:10px}
</style>

</head>
<body>

<div class="container">

<h2>🔥 VIP USER PANEL</h2>

<div class="card">
<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">

<input type="file" id="file" class="input">
<img id="preview" style="display:none">

<div class="role" onclick="setRole('OWNER',100000,this)">OWNER</div>
<div class="role" onclick="setRole('RESELLER',70000,this)">RESELLER</div>
<div class="role" onclick="setRole('VIP',60000,this)">VIP</div>
<div class="role" onclick="setRole('MEMBER',40000,this)">MEMBER</div>

<div id="harga"></div>

<button class="btn" onclick="kirim()">📤 Kirim ke Admin</button>
</div>

<div class="card">
<h3>📜 Riwayat</h3>
<div id="list"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "ISI_APIKEY",
  authDomain: "ISI",
  databaseURL: "ISI",
  projectId: "ISI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let role="", harga=0, img="";

function setRole(r,h,el){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;
 harga=h;
 document.getElementById("harga").innerHTML="💰 Rp "+h;
}

file.onchange=e=>{
 let f=e.target.files[0];
 let r=new FileReader();
 r.onload=()=>{
  img=r.result;
  preview.src=img;
  preview.style.display="block";
 };
 r.readAsDataURL(f);
};

function kirim(){
 if(!username.value||!password.value||!role||!img){
  alert("Lengkapi semua!");
  return;
 }

 db.ref("permohonan").push({
  username:username.value,
  password:password.value,
  role:role,
  harga:harga,
  img:img,
  status:"Pending",
  waktu:new Date().toLocaleString()
 });

 alert("🔥 Berhasil dikirim!");

 username.value="";
 password.value="";
 preview.style.display="none";
}

function load(){
 db.ref("permohonan").on("value",(snap)=>{
  let html="";
  snap.forEach(c=>{
    let d=c.val();

    html+=`
    <div class="card">
    <b>${d.username}</b> (${d.role})<br>
    💰 Rp ${d.harga}<br>
    Status: ${d.status}<br>
    <img src="${d.img}">
    </div>
    `;
  });
  list.innerHTML=html;
 });
}

load();
</script>

</body>
</html>
