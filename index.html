<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<style>
body{
 margin:0;
 font-family:Arial;
 color:white;
 background:url('begron.png') no-repeat center;
 background-size:cover;
}
.overlay{
 position:fixed;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.75);
 z-index:-1;
}
.menu{position:fixed;top:10px;left:10px;font-size:26px;cursor:pointer;}
.menu-box{
 position:fixed;top:50px;left:10px;background:#020617;
 padding:12px;border-radius:12px;display:none;
 z-index:999;box-shadow:0 0 25px #ff00aa;
}
.menu-box.show{display:block}

.logo-top{
 width:110px;display:block;margin:10px auto;
 border-radius:20px;box-shadow:0 0 20px #ff00aa;
}

.title{text-align:center;font-size:22px;text-shadow:0 0 10px #ff00aa;}
.container{padding:20px}

.card{
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
 padding:15px;border-radius:15px;margin-top:15px;
 box-shadow:0 0 40px #ff00aa;
}

.input{
 width:100%;padding:12px;margin-top:10px;border:none;
 border-radius:10px;background:#111;color:white;
}

.role{
 padding:10px;background:#111;margin-top:5px;
 border-radius:10px;cursor:pointer;text-align:center;
}
.role.active{background:#ff00aa}

.btn{
 width:100%;padding:12px;margin-top:10px;border:none;
 border-radius:10px;background:#ff00aa;color:white;
}

.item{
 background:#020617;padding:12px;border-radius:10px;margin-top:10px;
}

.valid{color:lime;}
.gagal{color:red;}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="menu" onclick="menuBox.classList.toggle('show')">☰</div>

<div class="menu-box" id="menuBox">

</div>

<div class="container">

<img src="logo.png" class="logo-top">

<div class="card">
<h3>📊 Analisis Sistem</h3>
<div id="analisis"></div>
</div>

<div class="card">
<h3>Buat Akun</h3>

<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">

<div class="role" onclick="pilih(this,'OWNER')">OWNER</div>
<div class="role" onclick="pilih(this,'RESELLER')">RESELLER</div>
<div class="role" onclick="pilih(this,'VIP')">VIP</div>
<div class="role" onclick="pilih(this,'MEMBER')">MEMBER</div>

<!-- 🔥 TAMBAHAN (TIDAK MENGUBAH APA PUN) -->
<div id="harga" style="color:yellow;margin-top:5px"></div>

<button class="btn" onclick="kirim()">📤 Kirim ke Sistem</button>

<p style="font-size:12px;color:yellow">
⚠️ WAJIB KIRIM BUKTI TRANSAKSI KE ADMIN  
⚠️ TUNGGU BOT SAMPAI SELESAI untung lu 
ambil 20%
</p>

</div>

<div class="card">
<h3>🤖 Status Bot</h3>
<button class="btn" onclick="clearBot()">🔄 Refresh Bot</button>
<div id="bot"></div>
</div>

<div class="card">
<h3>🔍 Pencarian Akun</h3>
<input id="search" class="input" placeholder="Cari username..." oninput="renderAkun()">
<div id="akunList"></div>
</div>

</div>

<script>

let role="";

function pilih(el,r){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;

 // 🔥 TAMBAHAN HARGA (TIDAK UBAH LOGIC LAIN)
 if(r==="OWNER") harga.innerText="💰 110k";
 else if(r==="RESELLER") harga.innerText="💰 80k";
 else if(r==="VIP") harga.innerText="💰 60k";
 else if(r==="MEMBER") harga.innerText="💰 30k";
}

// DATA AKUN
let akunData = [

function sensor(p){return p?p[0]+"xxxx":""}

function renderAkun(){
 let s=search.value.toLowerCase();
 let hasil=akunData.filter(a=>a.user.toLowerCase().includes(s));

 akunList.innerHTML=hasil.map(a=>`
 <div class="item" onclick="isi('${a.user}','${a.pass}')">
 👤 ${a.user}<br>
 🔒 ${sensor(a.pass)}<br>
 <span style="color:lime">✔</span> VIP
 </div>
 `).join("")||"<div class='item'>Tidak ditemukan</div>";
}

function isi(u,p){
 username.value=u;
 password.value=p;
}

// KIRIM
function kirim(){
 if(!username.value||!password.value||!role){
  alert("Lengkapi!");
  return;
 }

 let data=[];
 try{
  data = JSON.parse(localStorage.getItem("botdata")) || [];
 }catch(e){
  data = [];
 }

 data.push({
  username:username.value,
  role:role,
  step:0,
  status:"pending",
  waktu:new Date().toLocaleString(),
  sent:false
 });

 localStorage.setItem("botdata",JSON.stringify(data));
 render();
}

// BOT + WA
setInterval(()=>{
 let data=[];
 try{
  data = JSON.parse(localStorage.getItem("botdata")) || [];
 }catch(e){
  data = [];
 }

 data.forEach(d=>{
  if(d.sent) return;

  if(d.step===0) d.step=1;
  else if(d.step===1) d.step=2;
  else if(d.step===2){
   d.status=Math.random()>0.3?"valid":"gagal";
   d.sent=true;

   if(d.status==="valid"){
    let pesan=`✅ DISETUJUI

User: ${d.username}
Role: ${d.role}
Status: AKTIF
Waktu: ${d.waktu}`;

    location.href="https://wa.me/6281385998324?text="+encodeURIComponent(pesan);
   }
  }
 });

 localStorage.setItem("botdata",JSON.stringify(data));
 render();

},2000);

// RENDER
function render(){

 let data=[];
 try{
  data = JSON.parse(localStorage.getItem("botdata")) || [];
 }catch(e){
  data = [];
 }

 bot.innerHTML=data.map(d=>{
 let status="";

 if(d.step===0) status="⏳ Sedang diproses...";
 else if(d.step===1) status="<span style='color:yellow'>🟡 Sedang verifikasi...</span>";
 else status=d.status==="valid"
  ? "<span class='valid'>✔ Valid</span>"
  : "<span class='gagal'>❌ Tidak valid</span>";

 return `<div class="item">${d.username}<br>${status}</div>`;
 }).join("");

 analisis.innerHTML=`
 👤 User: ${data.length?data[data.length-1].username:"-"}<br>
 📦 Total: ${data.length}<br>
 ⏳ Pending: ${data.filter(d=>!d.sent).length}<br>
 ✔ Valid: ${data.filter(d=>d.status==="valid").length}<br>
 🌐 ${navigator.onLine?"🟢 Online":"🔴 Offline"}
 `;
}

function clearBot(){
 localStorage.removeItem("botdata");
 render();
}

render();
renderAkun();

</script>

</html>
