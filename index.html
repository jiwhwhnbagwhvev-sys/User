<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP USER MODERN</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#05070f,#0b0f1a);
  color:white;
}

.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  background:#111;
  box-shadow:0 0 20px #ff00aa;
}

.container{padding:15px}

.card{
  background:rgba(17,24,39,0.8);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 25px #ff00aa33;
}

.input,.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

.input{background:#1f2937;color:white}
.btn{background:#ff00aa;color:white}

.role{
  background:#1f2937;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
.role.active{background:#ff00aa}

img{width:100%;margin-top:10px;border-radius:10px}

.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<div class="header">🔥 VIP USER MODERN</div>
<div class="toast" id="toast"></div>

<div class="container">

<div class="card">
<h3>📊 Statistik</h3>
<div id="stat"></div>
</div>

<div class="card">
<h3>📝 Buat Permohonan</h3>

<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">

<input type="file" id="file" class="input">
<img id="preview" style="display:none">

<div class="role" onclick="setRole('OWNER',100000,this)">OWNER</div>
<div class="role" onclick="setRole('RESELLER',70000,this)">RESELLER</div>
<div class="role" onclick="setRole('VIP',60000,this)">VIP</div>
<div class="role" onclick="setRole('MEMBER',40000,this)">MEMBER</div>

<div id="harga"></div>

<button class="btn" onclick="kirim()">📤 Kirim</button>
</div>

<div class="card">
<input id="search" class="input" placeholder="Cari..." onkeyup="render()">
</div>

<div id="list"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA0NJaW-W50zCvJEiU4Zp2I",
  authDomain: "vip-user-system-123.firebaseapp.com",
  databaseURL: "https://vip-user-system-123-default-rtdb.firebaseio.com",
  projectId: "vip-user-system-123",
  storageBucket: "vip-user-system-123.appspot.com",
  messagingSenderId: "126375271502",
  appId: "1:126375271502:web:90e9ad8b47"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let role="", harga=0, img="";
let allData=[];

function toast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2000);
}

function setRole(r,h,el){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;
 harga=h;
 document.getElementById("harga").innerHTML="💰 Rp "+h;
}

file.onchange=e=>{
 let reader=new FileReader();
 reader.onload=()=>{
  img=reader.result;
  preview.src=img;
  preview.style.display="block";
 };
 reader.readAsDataURL(e.target.files[0]);
};

function kirim(){
 if(!username.value||!password.value||!role||!img){
  toast("Lengkapi semua!");
  return;
 }

 db.ref("permohonan").push({
  username:username.value,
  password:password.value,
  role:role,
  harga:harga,
  img:img,
  status:"Pending",
  waktu:new Date().toLocaleString()
 });

 toast("🔥 Berhasil dikirim!");
 username.value="";
 password.value="";
 preview.style.display="none";
}

function load(){
 db.ref("permohonan").on("value",(snap)=>{
  allData=[];
  snap.forEach(c=>{
    allData.push(c.val());
  });
  render();
 });
}

function render(){
 let s=document.getElementById("search").value.toLowerCase();

 let pending=allData.filter(d=>d.status=="Pending").length;
 let ok=allData.filter(d=>d.status=="Approved").length;
 let no=allData.filter(d=>d.status=="Rejected").length;

 stat.innerHTML=`
 ⏳ ${pending} | ✔ ${ok} | ❌ ${no} | 👤 ${allData.length}
 `;

 list.innerHTML=allData
 .filter(d=>d.username.toLowerCase().includes(s))
 .map(d=>`
 <div class="card">
 <b>${d.username}</b> (${d.role})<br>
 💰 Rp ${d.harga}<br>
 Status: ${d.status}<br>
 <img src="${d.img}">
 </div>
 `).join("");
}

load();

</script>

</body>
</html>
