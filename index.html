<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP USER SYSTEM MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:url('begron.png') no-repeat center;
  background-size:cover;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

/* MENU */
.menu{
  position:fixed;
  top:10px;
  left:10px;
  font-size:26px;
  cursor:pointer;
}

/* MENU BOX */
.menu-box{
  position:fixed;
  top:50px;
  left:10px;
  background:#020617;
  padding:12px;
  border-radius:12px;
  display:none;
  z-index:999;
  box-shadow:0 0 25px #ff00aa;
}
.menu-box.show{display:block}

/* LOGO */
.logo-top{
  width:110px;
  display:block;
  margin:10px auto;
  border-radius:20px;
  box-shadow:0 0 20px #ff00aa;
}

/* TITLE */
.title{
  text-align:center;
  font-size:24px;
  text-shadow:0 0 10px #ff00aa;
}

/* CONTAINER */
.container{padding:20px}

/* CARD */
.card{
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 40px #ff00aa;
}

/* INPUT */
.input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}

/* ROLE */
.role-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.role{
  padding:12px;
  background:#111;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
.role.active{background:#ff00aa}

/* HARGA */
.harga{color:yellow;margin-top:10px;font-weight:bold}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff00aa;
  color:white;
}

/* ITEM */
.item{
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

/* STATUS */
.pending{color:orange;}
.valid{color:lime;}
.tolak{color:red;}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
  display:none;
  box-shadow:0 0 20px #ff00aa;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="menu" onclick="toggleMenu()">☰</div>

<div class="menu-box" id="menuBox">
  👤 VIP USER
  <hr>
  <p onclick="logout()" style="color:red;">Logout</p>
</div>

<div class="toast" id="toast"></div>

<div class="container">

<img src="logo.png" class="logo-top">
<div class="title">💗 VIP USER PANEL</div>

<!-- STAT -->
<div class="card">
<h3>📊 Statistik</h3>
<div id="stat"></div>
</div>

<!-- FORM -->
<div class="card">
<h3>Buat Akun</h3>

<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">

<input type="file" id="file" class="input">
<img id="preview" style="width:100%;display:none;border-radius:10px">

<div class="role-box">
<div class="role" onclick="selectRole(this,'OWNER',100000)">OWNER</div>
<div class="role" onclick="selectRole(this,'RESELLER',70000)">RESELLER</div>
<div class="role" onclick="selectRole(this,'VIP',60000)">VIP</div>
<div class="role" onclick="selectRole(this,'MEMBER',40000)">MEMBER</div>
</div>

<div id="harga" class="harga"></div>

<button class="btn" onclick="kirim()">📤 Kirim ke Admin</button>
<button class="btn" onclick="hapus()">🗑️ Hapus Semua</button>

</div>

<!-- RIWAYAT -->
<div class="card">
<h3>📜 Riwayat</h3>
<input id="search" class="input" placeholder="Cari username..." onkeyup="load()">
<div id="list"></div>
</div>

</div>

<script>

function toggleMenu(){ menuBox.classList.toggle("show"); }

function toast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2000);
}

function logout(){ location.reload(); }

let role="", harga=0, img="";
const hargaEl=document.getElementById("harga");

function selectRole(el,r,h){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;
 harga=h;
 hargaEl.innerHTML="💰 Rp "+h.toLocaleString("id-ID");
}

file.onchange=e=>{
 let f=e.target.files[0];
 let r=new FileReader();
 r.onload=()=>{
  img=r.result;
  preview.src=img;
  preview.style.display="block";
 };
 r.readAsDataURL(f);
};

function kirim(){
 if(!username.value||!password.value||!role||!img){
  toast("Lengkapi semua!");
  return;
 }

 let data=JSON.parse(localStorage.getItem("permohonan"))||[];

 data.push({
  username:username.value,
  password:password.value,
  role:role,
  harga:harga,
  img:img,
  status:"Pending",
  waktu:new Date().toLocaleString()
 });

 localStorage.setItem("permohonan",JSON.stringify(data));

 toast("📤 Dikirim ke admin!");

 username.value="";
 password.value="";
 preview.style.display="none";
 hargaEl.innerHTML="";

 load();
}

function hapus(){
 localStorage.removeItem("permohonan");
 load();
}

function load(){
 let data=JSON.parse(localStorage.getItem("permohonan"))||[];
 let search=document.getElementById("search").value.toLowerCase();

 let pending=data.filter(d=>d.status==="Pending").length;
 let ok=data.filter(d=>d.status==="Approved").length;
 let no=data.filter(d=>d.status==="Ditolak").length;
 let total=data.length;
 let uang=data.reduce((a,b)=>a+b.harga,0);

 stat.innerHTML=`
 ⏳ Pending: ${pending}<br>
 ✔ Approved: ${ok}<br>
 ❌ Ditolak: ${no}<br>
 👤 Total: ${total}<br>
 💰 Rp ${uang.toLocaleString("id-ID")}
 `;

 list.innerHTML=data
 .filter(d=>d.username.toLowerCase().includes(search))
 .slice().reverse()
 .map(d=>{

 let status="";

 if(d.status==="Pending"){
  status=`<span class="pending">⏳ Menunggu admin...</span>`;
 }

 if(d.status==="Approved"){
  status=`
  <span class="valid">✔ VALID</span><br>
  ✔ Akun telah dibuat<br>
  👤 ${d.username}<br>
  🔒 ${d.password}<br>
  📅 ${d.waktu}
  `;
 }

 if(d.status==="Ditolak"){
  status=`<span class="tolak">❌ Ditolak</span>`;
 }

 return `
 <div class="item">
 <b>${d.username}</b> (${d.role})<br>
 💰 Rp ${d.harga.toLocaleString("id-ID")}<br>
 ${status}
 <img src="${d.img}" style="width:100%;margin-top:5px">
 </div>
 `;
 }).join("");
}

load();

// 🔥 AUTO UPDATE DARI ADMIN
let lastData="";
setInterval(()=>{
 let now=localStorage.getItem("permohonan");
 if(lastData && lastData!==now){
   toast("🔔 Data diperbarui admin!");
 }
 lastData=now;
 load();
},2000);

</script>

</body>
</html>
