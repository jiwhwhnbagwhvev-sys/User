<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP USER DEWA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:url('begron.png') no-repeat center;
  background-size:cover;
  overflow-x:hidden;
}

/* 🌸 SAKURA */
.sakura{
  position:fixed;
  top:-10px;
  width:12px;
  height:12px;
  background:pink;
  border-radius:50%;
  opacity:0.7;
  animation:fall linear infinite;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

.container{padding:20px}

.card{
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 40px #ff00aa;
  transition:0.3s;
}
.card:hover{transform:scale(1.02)}

.input{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#111;
  color:white;
  border:none;
  border-radius:10px;
}

.role-box{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role{
  padding:12px;
  background:#111;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
.role.active{background:#ff00aa}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#ff00aa;
  border:none;
  border-radius:10px;
  color:white;
}

.item{
  background:#020617;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}

.pending{color:orange}
.valid{color:lime}
.tolak{color:red}

img{width:100%;margin-top:10px;border-radius:10px}

.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
  display:none;
  box-shadow:0 0 20px #ff00aa;
}
</style>
</head>

<body>

<div class="overlay"></div>
<div class="toast" id="toast"></div>

<div class="container">

<h2>💗 VIP USER DEWA PANEL</h2>

<!-- STAT -->
<div class="card">
<h3>📊 Statistik</h3>
<div id="stat"></div>
</div>

<!-- FORM -->
<div class="card">
<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">

<input type="file" id="file" class="input">
<img id="preview" style="display:none">

<div class="role-box">
<div class="role" onclick="selectRole(this,'OWNER',100000)">OWNER</div>
<div class="role" onclick="selectRole(this,'VIP',60000)">VIP</div>
</div>

<div id="harga"></div>

<button class="btn" onclick="kirim()">🔥 Kirim</button>
</div>

<!-- SEARCH -->
<div class="card">
<input id="search" class="input" placeholder="Cari..." onkeyup="load()">
</div>

<!-- LIST -->
<div id="list"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0NJaW-W50zCvJEiU4Zp2I",
  authDomain: "vip-user-system-123.firebaseapp.com",
  databaseURL: "https://vip-user-system-123-default-rtdb.firebaseio.com",
  projectId: "vip-user-system-123"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let role="", harga=0, img="";

// 🌸 sakura
setInterval(()=>{
 let s=document.createElement("div");
 s.className="sakura";
 s.style.left=Math.random()*100+"vw";
 s.style.animationDuration=(3+Math.random()*5)+"s";
 document.body.appendChild(s);
 setTimeout(()=>s.remove(),8000);
},300);

// toast
function toast(msg){
 let t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2000);
}

window.selectRole = function(el,r,h){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;
 harga=h;
 hargaEl.innerHTML="💰 Rp "+h;
}

file.onchange=e=>{
 let r=new FileReader();
 r.onload=()=>{
  img=r.result;
  preview.src=img;
  preview.style.display="block";
 };
 r.readAsDataURL(e.target.files[0]);
};

window.kirim = function(){
 if(!username.value||!password.value||!role||!img){
  toast("Lengkapi semua!");
  return;
 }

 push(ref(db,"permohonan"),{
  username:username.value,
  password:password.value,
  role:role,
  harga:harga,
  img:img,
  status:"Pending",
  waktu:new Date().toLocaleString()
 });

 toast("🔥 Dikirim!");
};

// load
function load(){
 onValue(ref(db,"permohonan"),snap=>{
  let data=[];
  snap.forEach(c=>data.push(c.val()));

  stat.innerHTML=`
  ⏳ ${data.filter(d=>d.status=="Pending").length} |
  ✔ ${data.filter(d=>d.status=="Approved").length} |
  ❌ ${data.filter(d=>d.status=="Rejected").length}
  `;

  let s=search.value.toLowerCase();

  list.innerHTML=data
  .filter(d=>d.username.toLowerCase().includes(s))
  .map(d=>{

  let status="";
  if(d.status=="Pending") status="<span class='pending'>⏳ Pending</span>";
  if(d.status=="Approved") status="<span class='valid'>✔ Valid</span>";
  if(d.status=="Rejected") status="<span class='tolak'>❌ Ditolak</span>";

  return `
  <div class="item">
  <b>${d.username}</b> (${d.role})<br>
  💰 Rp ${d.harga}<br>
  ${status}
  <img src="${d.img}">
  </div>`;
  }).join("");

 });
}

load();
</script>

</body>
</html>
