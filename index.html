<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP USER SYSTEM MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  background:url('begron.png') no-repeat center;
  background-size:cover;
}
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}
.container{padding:20px}
.card{
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 40px #ff00aa;
}
.input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
}
.role-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.role{
  padding:12px;
  background:#111;
  border-radius:10px;
  text-align:center;
}
.role.active{background:#ff00aa}
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff00aa;
  color:white;
}
.item{
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}
.pending{color:orange;}
.valid{color:lime;}
.tolak{color:red;}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<h2>💗 VIP USER PANEL</h2>

<div class="card">
<h3>Buat Akun</h3>

<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">

<input type="file" id="file" class="input">
<img id="preview" style="width:100%;display:none">

<div class="role-box">
<div class="role" onclick="selectRole(this,'OWNER',100000)">OWNER</div>
<div class="role" onclick="selectRole(this,'VIP',60000)">VIP</div>
</div>

<div id="harga"></div>

<button class="btn" onclick="kirim()">Kirim ke Admin</button>
</div>

<div class="card">
<h3>Riwayat</h3>
<div id="list"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0NJaW-W50zCvJEiU4Zp2I",
  authDomain: "vip-user-system-123.firebaseapp.com",
  databaseURL: "https://vip-user-system-123-default-rtdb.firebaseio.com",
  projectId: "vip-user-system-123"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let role="", harga=0, img="";

window.selectRole = function(el,r,h){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;
 harga=h;
 document.getElementById("harga").innerHTML="Rp "+h;
}

file.onchange=e=>{
 let r=new FileReader();
 r.onload=()=>{
  img=r.result;
  preview.src=img;
  preview.style.display="block";
 };
 r.readAsDataURL(e.target.files[0]);
};

// 🔥 FIX KIRIM
window.kirim = function(){
 let u=username.value;
 let p=password.value;

 if(!u||!p||!role||!img){
  alert("Lengkapi semua!");
  return;
 }

 push(ref(db,"permohonan"),{
  username:u,
  password:p,
  role:role,
  harga:harga,
  img:img,
  status:"Pending",
  waktu:new Date().toLocaleString()
 });

 alert("🔥 Berhasil!");
}

// 🔥 LOAD REALTIME
onValue(ref(db,"permohonan"),(snap)=>{
 let html="";
 snap.forEach(c=>{
  let d=c.val();

  html+=`
  <div class="item">
  <b>${d.username}</b><br>
  ${d.role}<br>
  Status: ${d.status}
  <img src="${d.img}">
  </div>
  `;
 });

 document.getElementById("list").innerHTML=html;
});
</script>

</body>
</html>
