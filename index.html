const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 AKUN LIST FULL
let akunList = [/* (isi lengkap sama yg lu kasih tadi) */];

function sensor(p){ return p ? p[0]+"xxxx" : ""; }

window.toggleMenu=()=>menuBox.classList.toggle("show");
window.logout=()=>location.reload();

let role="", harga=0, img="";
let dataAll=[];
let lastStatus={};

window.selectRole=function(el,r){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;

 if(r=="OWNER") harga=100000;
 if(r=="RESELLER") harga=70000;
 if(r=="VIP") harga=60000;
 if(r=="MEMBER") harga=40000;

 hargaEl.innerHTML="💰 Rp "+harga.toLocaleString("id-ID");
}

file.onchange=e=>{
 let r=new FileReader();
 r.onload=()=>{
  img=r.result;
  preview.src=img;
  preview.style.display="block";
 };
 r.readAsDataURL(e.target.files[0]);
};

window.kirim=function(){
 if(!username.value||!password.value||!role||!img){
  toast("Lengkapi semua!");
  return;
 }

 push(ref(db,"permohonan"),{
  username:username.value,
  password:password.value,
  role:role,
  harga:harga,
  img:img,
  status:"Pending",
  waktu:new Date().toLocaleString()
 });

 toast("📤 Dikirim!");
}

onValue(ref(db,"permohonan"),snap=>{
 dataAll=[];
 snap.forEach(c=>{
  let id=c.key;
  let d=c.val();

  if(lastStatus[id] && lastStatus[id]!=d.status){
   if(d.status=="Approved"){
    alert("⚠️ WAJIB KIRIM TRANSAKSI!");
    let msg=`✅ DISETUJUI\nUser: ${d.username}\nRole: ${d.role}\nStatus: AKTIF\nWaktu: ${d.waktu}`;
    window.open(`https://wa.me/6281385998324?text=${encodeURIComponent(msg)}`);
   }
  }

  lastStatus[id]=d.status;
  dataAll.push(d);
 });

 render();
});

window.render=function(){
 let s=search.value.toLowerCase();

 let data=dataAll.filter(d=>d.username.toLowerCase().includes(s));

 let pending=data.filter(d=>d.status==="Pending").length;
 let ok=data.filter(d=>d.status==="Approved").length;
 let no=data.filter(d=>d.status==="Rejected").length;

 stat.innerHTML=`⏳ ${pending} | ✔ ${ok} | ❌ ${no}`;

 list.innerHTML=data.map(d=>`
 <div class="item">
 ${d.username} (${d.role})<br>
 ${d.status}
 <img src="${d.img}">
 </div>
 `).join("");

 akunListView.innerHTML=akunList
 .filter(a=>a.user.toLowerCase().includes(s))
 .map(a=>`
 <div class="item">
 👤 ${a.user}<br>
 🔒 ${sensor(a.pass)}
 </div>
 `).join("");
}
