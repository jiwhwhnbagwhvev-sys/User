<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP USER PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070f;
  color:white;
}
.container{padding:20px}

.card{
  background:rgba(17,24,39,0.9);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 25px #ff00aa55;
}

.input,.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

.input{background:#111827;color:white}
.btn{background:#ff00aa;color:white;cursor:pointer}

.role{
  background:#111827;
  padding:10px;
  margin-top:5px;
  border-radius:10px;
  cursor:pointer;
}
.role.active{background:#ff00aa}

img{width:100%;margin-top:10px;border-radius:10px}

.status-p{color:orange}
.status-a{color:lime}
.status-r{color:red}

.topbar{
  background:#111;
  padding:10px;
  text-align:center;
  font-weight:bold;
  box-shadow:0 0 20px #ff00aa;
}

.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  padding:10px;
  border-radius:10px;
  display:none;
  box-shadow:0 0 20px #ff00aa;
}
</style>
</head>

<body>

<div class="topbar">🔥 VIP USER PRO MAX</div>

<div class="toast" id="toast"></div>

<div class="container">

<!-- 📊 STAT -->
<div class="card">
<h3>📊 Statistik</h3>
<div id="stat"></div>
</div>

<!-- 🧾 FORM -->
<div class="card">
<h3>📝 Buat Permohonan</h3>

<input id="username" class="input" placeholder="Username">
<input id="password" class="input" placeholder="Password">

<input type="file" id="file" class="input">
<img id="preview" style="display:none">

<div class="role" onclick="setRole('OWNER',100000,this)">OWNER</div>
<div class="role" onclick="setRole('RESELLER',70000,this)">RESELLER</div>
<div class="role" onclick="setRole('VIP',60000,this)">VIP</div>
<div class="role" onclick="setRole('MEMBER',40000,this)">MEMBER</div>

<div id="harga"></div>

<button class="btn" onclick="kirim()">📤 Kirim</button>
<button class="btn" onclick="resetForm()">♻️ Reset</button>
</div>

<!-- 🔍 SEARCH -->
<div class="card">
<input id="search" class="input" placeholder="Cari username..." onkeyup="render()">
</div>

<!-- 📜 LIST -->
<div id="list"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "ISI_APIKEY",
  authDomain: "ISI",
  databaseURL: "ISI",
  projectId: "ISI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let role="", harga=0, img="";
let allData=[];

// 🔔 TOAST
function toast(msg){
 let t=toastEl=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",2000);
}

// 🎭 ROLE
function setRole(r,h,el){
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
 role=r;
 harga=h;
 hargaEl.innerHTML="💰 Rp "+h.toLocaleString("id-ID");
}

// 🖼️ FILE
file.onchange=e=>{
 let f=e.target.files[0];
 let r=new FileReader();
 r.onload=()=>{
  img=r.result;
  preview.src=img;
  preview.style.display="block";
 };
 r.readAsDataURL(f);
};

// 📤 KIRIM
function kirim(){
 if(!username.value||!password.value||!role||!img){
  toast("Lengkapi semua!");
  return;
 }

 db.ref("permohonan").push({
  username:username.value,
  password:password.value,
  role:role,
  harga:harga,
  img:img,
  status:"Pending",
  waktu:new Date().toLocaleString()
 });

 toast("🔥 Berhasil dikirim!");
 resetForm();
}

// 🔄 RESET
function resetForm(){
 username.value="";
 password.value="";
 role="";
 harga=0;
 img="";
 preview.style.display="none";
 document.querySelectorAll(".role").forEach(x=>x.classList.remove("active"));
 hargaEl.innerHTML="";
}

// 📥 LOAD
function load(){
 db.ref("permohonan").on("value",(snap)=>{
  allData=[];
  snap.forEach(c=>{
    allData.push({id:c.key,...c.val()});
  });
  render();
 });
}

// 🎨 RENDER
function render(){
 let search=document.getElementById("search").value.toLowerCase();

 let pending=allData.filter(d=>d.status=="Pending").length;
 let ok=allData.filter(d=>d.status=="Approved").length;
 let no=allData.filter(d=>d.status=="Rejected").length;

 stat.innerHTML=`
 ⏳ ${pending} Pending<br>
 ✔ ${ok} Approved<br>
 ❌ ${no} Rejected<br>
 👤 Total ${allData.length}
 `;

 list.innerHTML=allData
 .filter(d=>d.username.toLowerCase().includes(search))
 .slice().reverse()
 .map(d=>{

 let statusClass=
  d.status=="Pending"?"status-p":
  d.status=="Approved"?"status-a":
  "status-r";

 return `
 <div class="card">
 <b>${d.username}</b> (${d.role})<br>
 💰 Rp ${d.harga}<br>
 <span class="${statusClass}">${d.status}</span><br>
 <img src="${d.img}">

 <button class="btn" onclick="hapus('${d.id}')">🗑️ Hapus</button>
 </div>
 `;
 }).join("");
}

// 🗑️ HAPUS
function hapus(id){
 if(confirm("Hapus data?")){
  db.ref("permohonan/"+id).remove();
 }
}

// 🚀 INIT
load();

</script>

</body>
</html>
